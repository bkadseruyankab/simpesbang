<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <!-- Background - dark slate rounded square -->
  <rect width="512" height="512" rx="80" ry="80" fill="#1e293b"/>
  
  <!-- Shield shape -->
  <path d="M256 80 L380 130 L380 280 Q380 380 256 440 Q132 380 132 280 L132 130 Z" 
        fill="none" stroke="#f8fafc" stroke-width="16" stroke-linejoin="round"/>
  
  <!-- Wrench icon inside shield -->
  <g transform="translate(256, 260) rotate(-45)">
    <!-- Wrench handle -->
    <rect x="-14" y="-80" width="28" height="120" rx="6" fill="#f8fafc"/>
    <!-- Wrench head -->
    <path d="M-28 -80 L-14 -100 L14 -100 L28 -80 L14 -70 L-14 -70 Z" fill="#f8fafc"/>
    <!-- Wrench grip lines -->
    <rect x="-8" y="-60" width="16" height="4" rx="1" fill="#1e293b"/>
    <rect x="-8" y="-46" width="16" height="4" rx="1" fill="#1e293b"/>
    <rect x="-8" y="-32" width="16" height="4" rx="1" fill="#1e293b"/>
  </g>
  
  <!-- Car silhouette at bottom of shield -->
  <g transform="translate(256, 370)">
    <path d="M-70 0 L-55 -25 L-30 -35 L30 -35 L55 -25 L70 0 Z" 
          fill="none" stroke="#f8fafc" stroke-width="8" stroke-linejoin="round" stroke-linecap="round"/>
    <!-- Wheels -->
    <circle cx="-40" cy="5" r="12" fill="none" stroke="#f8fafc" stroke-width="6"/>
    <circle cx="40" cy="5" r="12" fill="none" stroke="#f8fafc" stroke-width="6"/>
  </g>
  
  <!-- Text "SI" at top -->
  <text x="256" y="165" text-anchor="middle" font-family="Arial, sans-serif" 
        font-size="60" font-weight="bold" fill="#f8fafc" letter-spacing="4">SI</text>
</svg>
